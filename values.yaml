spec:
  destination:
    server: https://kubernetes.default.svc

# Workload enablement registry (ADR-0003). Applications and chart-Workload
# companions (VirtualServices, ExternalSecrets, oauth hosts, mounts,
# consumer-side Sphere credential projections) look up by name.
#
# Platform oauth hosts (non-Workload) stay outside the registry.
platform:
  oauthHosts:
    - kiali.adryan.me

workloads:
  breezewiki:
    enabled: true
    ingress:
      - name: breezewiki
        host: breeze.adryan.me
        oauth: false
        backend:
          host: breezewiki.breezewiki.svc.cluster.local
          port: 10416
  calibre:
    enabled: true
    ingress:
      - name: calibre
        host: calibre.adryan.me
        oauth: false
        backend:
          host: calibre-main.books.svc.cluster.local
          port: 8083
      - name: calibre-downloader
        host: cdownloader.adryan.me
        oauth: true
        backend:
          host: calibre-downloader.books.svc.cluster.local
          port: 8084
  cert-manager:
    enabled: true
    ingress: []
  csi-driver-rclone:
    enabled: true
    ingress: []
  devices:
    enabled: true
    ingress: []
  discord-music:
    enabled: false
    ingress: []
  homepage:
    enabled: true
    ingress:
      - name: homepage
        host: home.adryan.me
        oauth: false
        backend:
          host: homepage.homepage.svc.cluster.local
          port: 3000
  jellyfin:
    enabled: false
    ingress:
      - name: jellyfin
        host: jellyfin.adryan.me
        oauth: false
        backend:
          host: jellyfin.streaming.svc.cluster.local
          port: 8096
  keycloak:
    enabled: true
    ingress:
      - name: keycloak
        host: auth.adryan.me
        oauth: false
        backend:
          host: keycloak.keycloak.svc.cluster.local
          port: 8080
  longhorn:
    enabled: true
    ingress:
      - name: longhorn
        host: longhorn.adryan.me
        oauth: true
        backend:
          host: longhorn-frontend.longhorn.svc.cluster.local
          port: 80
  metrics-server:
    enabled: true
    ingress: []
  minecraft:
    enabled: true
    ingress: []
  monitoring:
    enabled: true
    ingress:
      - name: grafana
        host: grafana.adryan.me
        oauth: true
        backend:
          host: monitoring-grafana.monitoring.svc.cluster.local
          port: 80
      - name: prometheus
        host: prometheus.adryan.me
        oauth: true
        backend:
          host: monitoring-prometheus.monitoring.svc.cluster.local
          port: 9090
  oauth2-proxy:
    enabled: true
    ingress: []
  plex:
    enabled: false
    ingress:
      - name: plex
        host: plex.adryan.me
        oauth: false
        backend:
          host: plex.streaming.svc.cluster.local
          port: 32400
  reloader:
    enabled: true
    ingress: []
  rustdesk:
    enabled: true
    ingress: []
  storyteller:
    enabled: true
    ingress:
      - name: storyteller
        host: storyteller.adryan.me
        oauth: false
        backend:
          host: storyteller.books.svc.cluster.local
          port: 8001
  streaming:
    enabled: false
    ingress:
      - name: riven
        host: riven.adryan.me
        oauth: true
        backend:
          host: streaming-riven-frontend.streaming.svc.cluster.local
          port: 3000
      - name: prowlarr
        host: prowlarr.adryan.me
        oauth: true
        backend:
          host: streaming-prowlarr.streaming.svc.cluster.local
          port: 9696
      - name: seerr
        host: seerr.adryan.me
        oauth: false
        backend:
          host: streaming-seerr.streaming.svc.cluster.local
          port: 5055
  suwayomi:
    enabled: false
    ingress:
      - name: suwayomi
        host: suwayomi.adryan.me
        oauth: false
        backend:
          host: suwayomi.books.svc.cluster.local
          port: 4567
  tailscale:
    enabled: true
    ingress: []
  vault:
    enabled: true
    ingress:
      - name: vault
        host: vault.adryan.me
        oauth: false
        backend:
          host: vault.vault.svc.cluster.local
          port: 8200
  zurg:
    enabled: false
    ingress: []
