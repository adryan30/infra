{{- if eq (include "workload.enabled" (dict "root" . "name" "botato")) "true" }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: botato-env
  namespace: discord
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: botato-env
  data:
    - secretKey: DISCORD_TOKEN
      remoteRef:
        key: discord/botato
        property: DISCORD_TOKEN
    - secretKey: MUSIC_NODE_PASSWORD
      remoteRef:
        key: discord/botato
        property: MUSIC_NODE_PASSWORD
    # Lavalink reads LAVALINK_SERVER_PASSWORD; same Vault value as MUSIC_NODE_PASSWORD.
    - secretKey: LAVALINK_SERVER_PASSWORD
      remoteRef:
        key: discord/botato
        property: MUSIC_NODE_PASSWORD
    - secretKey: YOUTUBE_OAUTH_ENABLED
      remoteRef:
        key: discord/botato
        property: YOUTUBE_OAUTH_ENABLED
    - secretKey: YOUTUBE_OAUTH_REFRESH_TOKEN
      remoteRef:
        key: discord/botato
        property: YOUTUBE_OAUTH_REFRESH_TOKEN
    - secretKey: YOUTUBE_OAUTH_SKIP_INITIALIZATION
      remoteRef:
        key: discord/botato
        property: YOUTUBE_OAUTH_SKIP_INITIALIZATION
    - secretKey: YOUTUBE_PO_TOKEN
      remoteRef:
        key: discord/botato
        property: YOUTUBE_PO_TOKEN
    - secretKey: YOUTUBE_VISITOR_DATA
      remoteRef:
        key: discord/botato
        property: YOUTUBE_VISITOR_DATA
{{- end }}
