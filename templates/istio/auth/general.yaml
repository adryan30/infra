apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: oauth2-general
  namespace: istio-system
spec:
  selector:
    matchLabels:
      istio: gateway
  action: CUSTOM
  provider:
    name: oauth2-proxy
  rules:
    - to:
        - operation:
            hosts:
              {{- /* Platform (non-Workload) oauth hosts — outside the registry. */}}
              {{- range .Values.platform.oauthHosts }}
              - {{ . | quote }}
              {{- end }}
              {{- /* Workload oauth hosts: enabled ∧ ingress.oauth. */}}
              {{- range $name, $wl := .Values.workloads }}
              {{- if and $wl.enabled $wl.ingress }}
              {{- range $ing := $wl.ingress }}
              {{- if $ing.oauth }}
              - {{ $ing.host | quote }}
              {{- end }}
              {{- end }}
              {{- end }}
              {{- end }}
