apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: public
  namespace: istio-ingress
spec:
  selector:
    istio: gateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"
      # Force HTTPS so apps behind TLS termination (e.g. Vault OIDC UI)
      # do not build http:// redirect_uris that auth roles reject.
      tls:
        httpsRedirect: true
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: adryan.me-tls
      hosts:
        - "*"
