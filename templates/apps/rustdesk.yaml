{{- if eq (include "workload.enabled" (dict "root" . "name" "rustdesk")) "true" }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rustdesk
  namespace: argocd
  finalizers:
    {{- include "workload.finalizers" . | nindent 4 }}
  labels:
    name: rustdesk
spec:
  project: default
  source:
    repoURL: https://schich.tel/helm-charts
    targetRevision: 0.2.3
    chart: rustdesk-server-oss
    helm:
      valuesObject:
        service:
          type: LoadBalancer

  destination:
    server: {{ include "workload.destinationServer" . }}
    namespace: rustdesk

  {{- include "workload.syncPolicy" (dict "profile" "workload") | nindent 2 }}
  revisionHistoryLimit: {{ include "workload.revisionHistoryLimit" . }}
{{- end }}
