{{- if eq (include "workload.enabled" (dict "enabled" true)) "true" }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devices
  namespace: argocd
  finalizers:
    {{- include "workload.finalizers" . | nindent 4 }}
  labels:
    name: devices
spec:
  project: default
  source:
    repoURL: https://charts.gabe565.com
    targetRevision: 0.1.3
    chart: generic-device-plugin
    helm:
      valuesObject:
        env:
          DOMAIN: adryan.me

  destination:
    server: {{ include "workload.destinationServer" . }}
    namespace: kube-system

  {{- include "workload.syncPolicy" (dict "profile" "workload") | nindent 2 }}
  revisionHistoryLimit: {{ include "workload.revisionHistoryLimit" . }}
{{- end }}
