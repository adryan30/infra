{{- if eq (include "workload.enabled" (dict "enabled" false)) "true" }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zurg
  namespace: argocd
  finalizers:
    {{- include "workload.finalizers" . | nindent 4 }}
  labels:
    name: zurg
spec:
  project: default
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    targetRevision: 4.4.0
    chart: app-template
    helm:
      valuesObject:
        controllers:
          zurg:
            strategy: RollingUpdate
            annotations:
              reloader.stakater.com/auto: "true"
            containers:
              zurg:
                image:
                  repository: ghcr.io/debridmediamanager/zurg-testing
                  tag: latest
        service:
          zurg:
            controller: zurg
            ports:
              http:
                port: 9999
        persistence:
          zurg-config:
            enabled: true
            type: secret
            name: zurg-config
            advancedMounts:
              zurg:
                zurg:
                  - path: /app/config.yml
                    readOnly: true
                    subPath: config.yml
                  - path: /app/plex_update.sh
                    readOnly: true
                    subPath: plex_update.sh

  destination:
    server: {{ include "workload.destinationServer" . }}
    namespace: streaming

  {{- include "workload.syncPolicy" (dict "profile" "workload") | nindent 2 }}
  revisionHistoryLimit: {{ include "workload.revisionHistoryLimit" . }}
{{- end }}
