{{- if eq (include "workload.enabled" (dict "enabled" false)) "true" }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jellyfin
  namespace: argocd
  finalizers:
    {{- include "workload.finalizers" . | nindent 4 }}
  labels:
    name: jellyfin
spec:
  project: default
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    targetRevision: 4.4.0
    chart: app-template
    helm:
      valuesObject:
        controllers:
          jellyfin:
            strategy: RollingUpdate
            annotations:
              reloader.stakater.com/auto: "true"
            containers:
              jellyfin:
                image:
                  repository: lscr.io/linuxserver/jellyfin
                  tag: latest
                  pullPolicy: Always
                env:
                  PGID: 0
                  PUID: 0
                  TZ: America/Bahia
        service:
          jellyfin:
            controller: jellyfin
            ports:
              http:
                port: 8096
        persistence:
          config:
            accessMode: ReadWriteOnce
            size: 10Gi
            type: persistentVolumeClaim
          riven:
            enabled: true
            type: persistentVolumeClaim
            existingClaim: streaming-riven-library
            globalMounts:
              - path: /library
          zurg-mount:
            enabled: true
            type: persistentVolumeClaim
            existingClaim: zurg
            globalMounts:
              - path: /rclone

  destination:
    server: {{ include "workload.destinationServer" . }}
    namespace: streaming

  {{- include "workload.syncPolicy" (dict "profile" "workload") | nindent 2 }}
  revisionHistoryLimit: {{ include "workload.revisionHistoryLimit" . }}
{{- end }}
