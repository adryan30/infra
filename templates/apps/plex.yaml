{{- if eq (include "workload.enabled" (dict "root" . "name" "plex")) "true" }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: plex
  namespace: argocd
  finalizers:
    {{- include "workload.finalizers" . | nindent 4 }}
  labels:
    name: plex
spec:
  project: default
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    targetRevision: 4.4.0
    chart: app-template
    helm:
      valuesObject:
        controllers:
          plex:
            strategy: RollingUpdate
            annotations:
              reloader.stakater.com/auto: "true"
            containers:
              plex:
                image:
                  repository: plexinc/pms-docker
                  tag: latest
                  pullPolicy: Always
                env:
                  TZ: America/Bahia
                  PLEX_UID: 0
                  PLEX_GID: 0
                envFrom:
                  - secretRef:
                      name: plex-key
        service:
          plex:
            controller: plex
            ports:
              http:
                port: 32400
        persistence:
          config:
            accessMode: ReadWriteOnce
            size: 1Gi
            type: persistentVolumeClaim
          transcode:
            accessMode: ReadWriteOnce
            size: 10Gi
            type: persistentVolumeClaim
          media:
            accessMode: ReadWriteOnce
            size: 10Gi
            type: persistentVolumeClaim
          riven:
            enabled: true
            type: persistentVolumeClaim
            existingClaim: streaming-riven-library
            globalMounts:
              - path: /library
          zurg-mount:
            enabled: true
            type: persistentVolumeClaim
            existingClaim: zurg
            globalMounts:
              - path: /rclone

  destination:
    server: {{ include "workload.destinationServer" . }}
    namespace: streaming

  {{- include "workload.syncPolicy" (dict "profile" "workload") | nindent 2 }}
  revisionHistoryLimit: {{ include "workload.revisionHistoryLimit" . }}
{{- end }}
