{{- if eq (include "workload.enabled" (dict "root" . "name" "minecraft")) "true" }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minecraft
  namespace: argocd
  finalizers:
    {{- include "workload.finalizers" . | nindent 4 }}
  labels:
    name: minecraft
spec:
  project: default
  source:
    repoURL: https://itzg.github.io/minecraft-server-charts
    targetRevision: 5.0.0
    chart: minecraft
    helm:
      valuesObject:
        # Chart-local scale-to-zero — not Workload disablement (ADR-0003 / CONTEXT).
        # Disable minecraft via workloads.minecraft.enabled in values.yaml.
        replicaCount: 0
        podAnnotations:
          reloader.stakater.com/auto: "true"
        resources:
          requests:
            cpu: 1m
            memory: 1Gi
          limits:
            memory: 2Gi
        mcbackup:
            enabled: true
            backupInterval: 24h
            linkLatest: "true"
            persistence:
              storageClass: "longhorn-low"
              backupDir:
                enabled: true
                Size: 10Gi
        minecraftServer:
          eula: "TRUE"
          version: "1.21.11"
          type: "PAPER"
          ops: adryan29
          onlineMode: true
          motd:  "== Bem vindo ao servidor do Leo! =="
          serviceType: LoadBalancer
          # whitelist: adryan29,Andrey
          rcon:
            enabled: true
            serviceType: LoadBalancer
            existingSecret: rcon
          pluginUrls:
            - "https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/spigot"
            - "https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot"
            - "https://cdn.modrinth.com/data/Lu3KuzdV/versions/HD2IvrxS/CoreProtect-CE-23.1.jar"
          extraPorts:
            - name: geyser
              containerPort: 19132
              protocol: UDP
              service:
                enabled: true
                type: LoadBalancer
                port: 19132
        persistence:
          storageClass: "longhorn-low"
          dataDir:
            enabled: true
            Size: 10Gi

  destination:
    server: {{ include "workload.destinationServer" . }}
    namespace: minecraft

  {{- include "workload.syncPolicy" (dict "profile" "workload") | nindent 2 }}
  revisionHistoryLimit: {{ include "workload.revisionHistoryLimit" . }}
{{- end }}
