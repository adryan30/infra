{{- if eq (include "workload.enabled" (dict "root" . "name" "longhorn")) "true" }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  finalizers:
    {{- include "workload.finalizers" . | nindent 4 }}
  labels:
    name: longhorn
spec:
  project: default
  source:
    repoURL: https://charts.longhorn.io
    targetRevision: v1.10.0
    chart: longhorn
    helm:
      valuesObject:
        preUpgradeChecker:
          jobEnabled: false
        defaultSettings:
          defaultReplicaCount: "1"

  destination:
    server: {{ include "workload.destinationServer" . }}
    namespace: longhorn

  info:
    - name: "Homepage:"
      value: "https://longhorn.adryan.me"

  {{- include "workload.syncPolicy" (dict "profile" "platform") | nindent 2 }}
  revisionHistoryLimit: {{ include "workload.revisionHistoryLimit" . }}
{{- end }}
