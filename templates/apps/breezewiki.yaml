{{- if eq (include "workload.enabled" (dict "root" . "name" "breezewiki")) "true" }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: breezewiki
  namespace: argocd
  finalizers:
    {{- include "workload.finalizers" . | nindent 4 }}
  labels:
    name: breezewiki
spec:
  project: default
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    targetRevision: 4.4.0
    chart: app-template
    helm:
      valuesObject:
        controllers:
          main:
            strategy: RollingUpdate
            annotations:
              reloader.stakater.com/auto: "true"
            containers:
              main:
                image:
                  repository: quay.io/pussthecatorg/breezewiki
                  tag: latest
        service:
          main:
            controller: main
            ports:
              http:
                port: 10416

  destination:
    server: {{ include "workload.destinationServer" . }}
    namespace: breezewiki

  {{- include "workload.syncPolicy" (dict "profile" "workload") | nindent 2 }}
  revisionHistoryLimit: {{ include "workload.revisionHistoryLimit" . }}
{{- end }}
