{{- if eq (include "workload.enabled" (dict "enabled" false)) "true" }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: discord-music
  namespace: argocd
  finalizers:
    {{- include "workload.finalizers" . | nindent 4 }}
  labels:
    name: discord-music
spec:
  project: default
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    targetRevision: 4.4.0
    chart: app-template
    helm:
      valuesObject:
        controllers:
          main:
            strategy: RollingUpdate
            annotations:
              reloader.stakater.com/auto: "true"
            containers:
              main:
                image:
                  repository: ghcr.io/yojoshb/jmusicbot-docker
                  tag: latest
                env:
                  BOT_GITHUB: noxianwill/MusicBot
                  BOT_VERSION: v0.4.3-fixed

        service:
          main:
            controller: main
            ports:
              http:
                port: 10416
        persistence:
          discord-config:
            enabled: true
            type: secret
            name: discord-config
            advancedMounts:
              main:
                main:
                  - path: /config/config.txt
                    readOnly: true
                    subPath: config.txt

  destination:
    server: {{ include "workload.destinationServer" . }}
    namespace: discord

  {{- include "workload.syncPolicy" (dict "profile" "workload") | nindent 2 }}
  revisionHistoryLimit: {{ include "workload.revisionHistoryLimit" . }}
{{- end }}
