{{- if eq (include "workload.enabled" (dict "root" . "name" "calibre")) "true" }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: calibre
  namespace: argocd
  finalizers:
    {{- include "workload.finalizers" . | nindent 4 }}
  labels:
    name: calibre
spec:
  project: default
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    targetRevision: 4.6.2
    chart: app-template
    helm:
      valuesObject:
        controllers:
          main:
            strategy: RollingUpdate
            annotations:
              reloader.stakater.com/auto: "true"
            containers:
              main:
                image:
                  repository: crocodilestick/calibre-web-automated
                  tag: latest
                env:
                  PUID: "1000"
                  PGID: "1000"
                  TZ: "America/Bahia"
                  CWA_PORT_OVERRIDE: "8083"
              downloader:
                dependsOn: main
                image:
                  repository: ghcr.io/calibrain/calibre-web-automated-book-downloader
                  tag: latest
                env:
                  FLASK_PORT: 8084
                  LOG_LEVEL: info
                  BOOK_LANGUAGE: pt,en
                  USE_BOOK_TITLE: true
                  TZ: America/Bahia
                  APP_ENV: prod
                  UID: 1000
                  GID: 100
                  MAX_CONCURRENT_DOWNLOADS: 3
                  DOWNLOAD_PROGRESS_UPDATE_INTERVAL: 5
        service:
          main:
            controller: main
            ports:
              http:
                port: 8083
          downloader:
            controller: main
            ports:
              http:
                port: 8084
        persistence:
          config:
            accessMode: ReadWriteOnce
            size: 1Gi
            type: persistentVolumeClaim
            globalMounts:
              - path: /config
          ingest:
            accessMode: ReadWriteOnce
            size: 4Gi
            type: persistentVolumeClaim
            globalMounts:
              - path: /cwa-book-ingest
          library:
            accessMode: ReadWriteOnce
            size: 20Gi
            type: persistentVolumeClaim
            globalMounts:
              - path: /calibre-library
          plugins:
            accessMode: ReadWriteOnce
            size: 10Gi
            type: persistentVolumeClaim
            globalMounts:
              - path: /config/.config/calibre/plugins

  destination:
    server: {{ include "workload.destinationServer" . }}
    namespace: books

  {{- include "workload.syncPolicy" (dict "profile" "workload") | nindent 2 }}
  revisionHistoryLimit: {{ include "workload.revisionHistoryLimit" . }}
{{- end }}
