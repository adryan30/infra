{{- if eq (include "workload.enabled" (dict "enabled" true)) "true" }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  finalizers:
    {{- include "workload.finalizers" . | nindent 4 }}
  labels:
    name: monitoring
spec:
  project: default
  source:
    repoURL: oci://ghcr.io/prometheus-community/charts/kube-prometheus-stack
    targetRevision: 79.5.0
    path: .
    helm:
      valuesObject:
        global:
          rbac:
            createAggregateClusterRoles: true
        prometheus:
          prometheusSpec:
            podMonitorSelectorNilUsesHelmValues: false
            serviceMonitorSelectorNilUsesHelmValues: false
        nameOverride: monitoring
        fullnameOverride: monitoring
        grafana:
          admin:
            existingSecret: monitoring-grafana-admin
            userKey: user
            passwordKey: password
          persistence:
            enabled: true
            accessModes:
              - ReadWriteOnce
            size: 5Gi

  destination:
    server: {{ include "workload.destinationServer" . }}
    namespace: monitoring

  ignoreDifferences:
    - kind: "ConfigMap"
      namespace: monitoring
      jsonPointers:
        - /data/grafana.ini

  {{- include "workload.syncPolicy" (dict "profile" "workload") | nindent 2 }}
  revisionHistoryLimit: {{ include "workload.revisionHistoryLimit" . }}
{{- end }}
